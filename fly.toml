# fly.toml app configuration file generated for dino-match-party on 2026-03-14T09:41:13-06:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

# app            = '<add-app-name-here>'
primary_region = 'lax'

[build]
dockerfile = 'Dockerfile'

[http_service]
internal_port        = 3000
force_https          = true
auto_stop_machines   = 'off'
auto_start_machines  = true
min_machines_running = 0
max_machines_running = 1

[[http_service.checks]]
interval     = '30s'
timeout      = '5s'
grace_period = '10s'
method       = 'GET'
path         = '/health'

[[vm]]
memory   = 256
cpus     = 1
cpu_kind = "shared"
